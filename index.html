<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>COEDUCA — Portal Estudiantil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script src="data/students_7A.js"></script>
  <script src="data/students_8A.js"></script>
  <script src="data/students_9A.js"></script>
  <script src="data/students_1BtoA.js"></script>
  <script src="data/students_2BtoA.js"></script>
  <script src="data/Maestros.js"></script>
  <script src="data/config.js"></script>

  <style>
    :root {
      /* ── Paleta celeste ── */
      --navy:#071a2e; --deep:#0c2945; --ocean:#10496e;
      --mid:#27a4d4; --sky:#56d0f5; --cyan:#7ee3fc;
      --ice:#c8f2ff; --white:#edf9ff;
      --dim:rgba(200,242,255,0.55);
      --g-bg:rgba(86,208,245,0.07);
      --g-border:rgba(126,227,252,0.22);
      --shadow-lg:0 20px 60px rgba(0,0,0,0.4);
      --shadow-sm:0 4px 20px rgba(0,0,0,0.2);
      --rx:22px; --rl:16px; --rm:10px;
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}

    body{
      min-height:100vh;
      background-color:#061724;
      background-image:
        radial-gradient(ellipse at 15% 40%,#0d3a5e 0%,transparent 55%),
        radial-gradient(ellipse at 85% 10%,#0b5577 0%,transparent 50%),
        radial-gradient(ellipse at 60% 90%,#083050 0%,transparent 45%),
        linear-gradient(160deg,#061724 0%,#0a2e48 40%,#07263d 100%);
      background-attachment:fixed;
      font-family:'DM Sans',sans-serif;
      color:var(--white);
      overflow-x:hidden;
    }

    #root-wrapper{min-height:100vh;position:relative;}

    @keyframes fadeIn  {from{opacity:0}to{opacity:1}}
    @keyframes slideUp {from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
    @keyframes shimmer {0%{background-position:-200% center}100%{background-position:200% center}}
    @keyframes pulse-ring{0%,100%{box-shadow:0 0 0 0 rgba(126,227,252,.25)}50%{box-shadow:0 0 0 14px rgba(126,227,252,0)}}
    @keyframes spin-slow{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}

    /* ══ LOGIN ══════════════════════════════════════════════════ */
    #login-screen{
      position:fixed;inset:0;display:flex;align-items:center;
      justify-content:center;z-index:200;padding:1rem;
      animation:fadeIn .4s ease;
    }
    .orb{position:fixed;border-radius:50%;filter:blur(80px);pointer-events:none;}
    .orb1{width:500px;height:500px;top:-120px;right:-100px;background:rgba(86,208,245,.12);}
    .orb2{width:400px;height:400px;bottom:-80px;left:-80px;background:rgba(16,73,110,.25);}

    .login-card{
      position:relative;z-index:1;width:100%;max-width:440px;
      padding:3rem 2.5rem;text-align:center;
      background:rgba(10,35,60,.55);
      backdrop-filter:blur(28px) saturate(1.6);
      -webkit-backdrop-filter:blur(28px) saturate(1.6);
      border:1px solid rgba(126,227,252,.25);border-radius:28px;
      box-shadow:var(--shadow-lg),inset 0 1px 0 rgba(200,242,255,.1);
      animation:slideUp .5s cubic-bezier(.16,1,.3,1);
    }
    .login-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent,rgba(126,227,252,.55),transparent);
      border-radius:28px 28px 0 0;
    }

    .logo-wrap{position:relative;width:88px;height:88px;margin:0 auto 1.4rem;}
    .logo-ring{
      position:absolute;inset:-6px;border-radius:50%;
      border:2px solid rgba(126,227,252,.35);
      animation:pulse-ring 2.8s ease infinite;
    }
    .login-logo{
      width:88px;height:88px;object-fit:contain;border-radius:50%;display:block;
      filter:drop-shadow(0 0 18px rgba(86,208,245,.5));
    }
    .logo-fb{
      width:88px;height:88px;border-radius:50%;
      background:linear-gradient(135deg,var(--mid),var(--sky));
      display:flex;align-items:center;justify-content:center;
      font-family:'Outfit',sans-serif;font-size:1.4rem;font-weight:800;
      color:white;letter-spacing:1px;box-shadow:0 0 30px rgba(86,208,245,.4);
    }

    .login-title{
      font-family:'Outfit',sans-serif;font-size:2.4rem;font-weight:800;letter-spacing:4px;
      background:linear-gradient(135deg,#7ee3fc 0%,#c8f2ff 50%,#7ee3fc 100%);
      background-size:200% auto;
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      animation:shimmer 4s linear infinite;margin-bottom:.2rem;
    }
    .login-sub{font-size:.8rem;color:var(--dim);letter-spacing:2px;text-transform:uppercase;margin-bottom:2rem;}

    .autologin-banner{
      display:none;margin-bottom:1.2rem;padding:.8rem 1rem;
      background:rgba(86,208,245,.08);border:1px solid rgba(126,227,252,.22);
      border-radius:var(--rm);font-size:.8rem;color:var(--ice);text-align:left;
    }
    .autologin-banner strong{display:block;margin-bottom:.1rem;color:var(--cyan);font-size:.88rem;}
    .autologin-banner .al-grade{font-size:.71rem;color:var(--dim);}
    .btn-al{
      margin-top:.55rem;width:100%;padding:.55rem;
      background:linear-gradient(135deg,var(--sky),var(--mid));
      border:none;border-radius:8px;color:white;
      font-size:.82rem;font-weight:600;font-family:inherit;cursor:pointer;transition:opacity .2s;
    }
    .btn-al:hover{opacity:.85;}
    .btn-other{
      margin-top:.4rem;width:100%;padding:.4rem;
      background:transparent;border:1px solid rgba(126,227,252,.2);
      border-radius:8px;color:var(--dim);font-size:.74rem;font-family:inherit;cursor:pointer;
      transition:color .2s;
    }
    .btn-other:hover{color:var(--ice);}

    .input-label{
      display:block;text-align:left;font-size:.72rem;font-weight:600;
      color:var(--cyan);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.5rem;
    }
    .nie-input{
      width:100%;padding:.95rem 1.2rem;
      background:rgba(255,255,255,.06);border:1px solid rgba(126,227,252,.28);
      border-radius:var(--rm);color:var(--white);font-size:1.05rem;
      font-family:'DM Sans',sans-serif;letter-spacing:2px;outline:none;margin-bottom:1.2rem;
      transition:border-color .25s,background .25s,box-shadow .25s;
    }
    .nie-input::placeholder{color:rgba(200,242,255,.3);letter-spacing:1px;font-size:.9rem;}
    .nie-input:focus{border-color:var(--cyan);background:rgba(86,208,245,.1);box-shadow:0 0 0 3px rgba(86,208,245,.15);}

    .btn-login{
      width:100%;padding:.95rem;
      background:linear-gradient(135deg,var(--sky) 0%,var(--mid) 100%);
      border:none;border-radius:var(--rm);color:white;font-size:1rem;font-weight:600;
      font-family:'DM Sans',sans-serif;cursor:pointer;letter-spacing:.5px;
      transition:transform .2s,box-shadow .2s;position:relative;overflow:hidden;
    }
    .btn-login::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.15),transparent);border-radius:inherit;}
    .btn-login:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(86,208,245,.4);}
    .btn-login:active{transform:translateY(0);}

    .login-error{
      margin-top:.9rem;padding:.65rem 1rem;
      background:rgba(239,68,68,.12);border:1px solid rgba(239,68,68,.3);
      border-radius:8px;color:#fca5a5;font-size:.82rem;display:none;
      animation:slideUp .3s ease;
    }

    /* ══ APP ════════════════════════════════════════════════════ */
    #app{display:none;animation:fadeIn .4s ease;}

    .topbar{
      position:sticky;top:0;z-index:100;
      display:flex;align-items:center;justify-content:space-between;
      padding:.65rem 1.1rem;
      background:rgba(6,23,36,.88);
      backdrop-filter:blur(24px) saturate(1.5);
      -webkit-backdrop-filter:blur(24px);
      border-bottom:1px solid rgba(126,227,252,.15);
      box-shadow:0 2px 20px rgba(0,0,0,.25);
    }
    .topbar-brand{display:flex;align-items:center;gap:.65rem;}
    .topbar-logo{width:34px;height:34px;object-fit:contain;border-radius:8px;}
    .topbar-name{
      font-family:'Outfit',sans-serif;font-size:1.15rem;font-weight:800;letter-spacing:3px;
      background:linear-gradient(90deg,var(--cyan),var(--ice));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      line-height:1.1;
    }
    .topbar-tagline{font-size:.58rem;color:var(--dim);letter-spacing:1.5px;text-transform:uppercase;}
    .topbar-right{display:flex;align-items:center;gap:.45rem;}
    .topbar-pill{
      font-size:.7rem;color:var(--ice);
      background:rgba(126,227,252,.1);border:1px solid rgba(126,227,252,.2);
      border-radius:20px;padding:.2rem .7rem;
      max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
    }
    .btn-logout{
      display:flex;align-items:center;gap:.3rem;padding:.32rem .75rem;
      background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);
      border-radius:8px;color:#fca5a5;font-size:.7rem;font-weight:500;
      cursor:pointer;font-family:inherit;transition:background .2s;
    }
    .btn-logout:hover{background:rgba(239,68,68,.22);}

    .app-body{
      max-width:840px;margin:0 auto;
      padding:1.1rem .9rem 6rem;
      display:flex;flex-direction:column;gap:1.1rem;
    }

    .student-card{
      background:rgba(10,40,65,.55);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border:1px solid var(--g-border);border-radius:var(--rx);
      padding:1.3rem 1.5rem;
      display:flex;align-items:center;gap:1.1rem;
      box-shadow:var(--shadow-sm);position:relative;overflow:hidden;
      animation:slideUp .4s cubic-bezier(.16,1,.3,1);
    }
    .student-card::before{
      content:'';position:absolute;top:0;left:0;right:0;height:1px;
      background:linear-gradient(90deg,transparent 0%,rgba(126,227,252,.45) 50%,transparent 100%);
    }
    .sc-bg{
      position:absolute;right:-40px;top:-40px;width:180px;height:180px;border-radius:50%;
      background:radial-gradient(circle,rgba(86,208,245,.1) 0%,transparent 70%);
      pointer-events:none;
    }
    .avatar{
      width:66px;height:66px;flex-shrink:0;border-radius:50%;
      background:linear-gradient(135deg,var(--ocean) 0%,var(--sky) 100%);
      display:flex;align-items:center;justify-content:center;font-size:1.8rem;
      border:2px solid rgba(126,227,252,.4);box-shadow:0 0 25px rgba(86,208,245,.25);
      position:relative;
    }
    .avatar::after{
      content:'';position:absolute;inset:-4px;border-radius:50%;
      border:1px dashed rgba(126,227,252,.25);animation:spin-slow 12s linear infinite;
    }
    .s-name{font-family:'Outfit',sans-serif;font-size:1.1rem;font-weight:700;line-height:1.2;margin-bottom:.25rem;}
    .s-badge{
      display:inline-flex;align-items:center;gap:.28rem;padding:.17rem .62rem;
      background:rgba(86,208,245,.12);border:1px solid rgba(126,227,252,.25);
      border-radius:20px;font-size:.72rem;color:var(--cyan);font-weight:500;margin-bottom:.28rem;
    }
    .s-nie{font-size:.69rem;color:var(--dim);font-family:'Courier New',monospace;letter-spacing:1.5px;}

    .tabs-wrapper{
      background:rgba(10,40,65,.55);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border:1px solid var(--g-border);border-radius:var(--rx);
      overflow:hidden;box-shadow:var(--shadow-sm);
    }
    .tabs-bar{display:flex;background:rgba(0,0,0,.2);border-bottom:1px solid var(--g-border);}
    .tab-btn{
      flex:1;padding:.85rem .35rem;background:none;border:none;color:var(--dim);
      font-size:.79rem;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;
      display:flex;align-items:center;justify-content:center;gap:.3rem;
      border-bottom:2px solid transparent;margin-bottom:-1px;
      transition:color .2s,background .2s,border-color .2s;white-space:nowrap;
    }
    .tab-btn:hover{color:var(--white);background:rgba(255,255,255,.03);}
    .tab-btn.active{color:var(--cyan);border-bottom-color:var(--cyan);background:rgba(86,208,245,.07);}

    .tab-pane{padding:1.3rem 1.1rem;display:none;}
    .tab-pane.active{display:block;animation:fadeIn .25s ease;}

    .cal-center{text-align:center;padding:1.1rem .5rem;}
    .cal-icon{font-size:2.8rem;margin-bottom:.75rem;display:block;}
    .cal-msg{color:var(--dim);font-size:.87rem;margin-bottom:1.2rem;line-height:1.6;}
    .btn-cal{
      display:inline-flex;align-items:center;gap:.5rem;padding:.72rem 1.5rem;
      background:linear-gradient(135deg,var(--sky),var(--mid));
      border-radius:var(--rm);color:white;text-decoration:none;
      font-weight:600;font-size:.87rem;transition:transform .2s,box-shadow .2s;
    }
    .btn-cal:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(86,208,245,.35);}

    /* ── deméritos ── */
    .dem-center{padding:.5rem 0;}
    .dem-sname{font-size:.93rem;font-weight:600;color:var(--ice);margin-bottom:.8rem;text-align:center;}
    .dem-sname span{color:var(--cyan);}
    .dem-iframe-wrap{
      position:relative;width:100%;border-radius:var(--rm);overflow:hidden;
      border:1px solid rgba(126,227,252,.18);background:rgba(255,255,255,.03);
      margin-bottom:.6rem;
    }
    .dem-iframe-wrap iframe{
      width:100%;height:420px;border:none;display:block;background:#fff;border-radius:var(--rm);
    }
    .dem-iframe-loading{
      display:flex;align-items:center;justify-content:center;
      position:absolute;inset:0;background:rgba(6,23,36,.85);
      color:var(--dim);font-size:.8rem;gap:.5rem;
      pointer-events:none;transition:opacity .4s;
    }
    .dem-iframe-loading.hidden{opacity:0;pointer-events:none;}
    .dem-actions{display:flex;gap:.5rem;justify-content:center;flex-wrap:wrap;margin-top:.5rem;}
    .btn-dem{
      display:inline-flex;align-items:center;gap:.5rem;padding:.65rem 1.3rem;
      background:linear-gradient(135deg,#dc2626,#991b1b);
      border-radius:var(--rm);color:white;text-decoration:none;
      font-weight:600;font-size:.82rem;
      transition:transform .2s,box-shadow .2s;
      box-shadow:0 4px 15px rgba(220,38,38,.2);
    }
    .btn-dem:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(220,38,38,.35);}
    .btn-dem-secondary{
      display:inline-flex;align-items:center;gap:.4rem;padding:.65rem 1.3rem;
      background:rgba(126,227,252,.08);border:1px solid rgba(126,227,252,.22);
      border-radius:var(--rm);color:var(--cyan);text-decoration:none;
      font-weight:500;font-size:.82rem;transition:background .2s;
    }
    .btn-dem-secondary:hover{background:rgba(126,227,252,.15);}
    .dem-note{font-size:.72rem;color:var(--dim);margin-top:.7rem;line-height:1.5;text-align:center;}
    .dem-nolink{
      padding:1.1rem;background:rgba(86,208,245,.06);
      border:1px solid rgba(126,227,252,.18);border-radius:var(--rm);
      font-size:.82rem;color:var(--dim);margin-top:.5rem;line-height:1.6;text-align:center;
    }

    /* ── horario ── */
    .hor-subtabs{display:flex;gap:.4rem;margin-bottom:1rem;flex-wrap:wrap;}
    .hor-tab{
      padding:.36rem .85rem;background:rgba(255,255,255,.05);
      border:1px solid rgba(126,227,252,.2);border-radius:20px;
      font-size:.76rem;font-weight:500;cursor:pointer;
      color:var(--dim);font-family:inherit;transition:all .2s;
    }
    .hor-tab.active{background:rgba(86,208,245,.15);border-color:var(--cyan);color:var(--cyan);}
    .hor-panel{display:none;}
    .hor-panel.active{display:block;animation:fadeIn .2s ease;}

    .sched-wrap{position:relative;border-radius:var(--rm);overflow:hidden;}
    .sched-wrap::after{
      content:'';position:absolute;top:0;right:0;bottom:0;width:28px;
      background:linear-gradient(to right,transparent,rgba(6,23,36,.85));
      pointer-events:none;z-index:2;
    }
    .sched-scroll{width:100%;overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--rm);}

    .sched-table{border-collapse:collapse;width:max-content;min-width:100%;}
    .sched-table th{
      padding:.52rem .55rem;background:rgba(86,208,245,.15);color:var(--cyan);
      font-size:.67rem;font-weight:700;text-transform:uppercase;letter-spacing:.65px;
      text-align:center;border:1px solid rgba(126,227,252,.1);white-space:nowrap;
    }
    .sched-table th:first-child{text-align:left;padding-left:.75rem;min-width:108px;}
    .sched-table th:not(:first-child){min-width:86px;}
    .sched-table th.today-col{background:rgba(126,227,252,.28)!important;color:#fff;}
    .sched-table td{
      padding:.48rem .48rem;text-align:center;
      border:1px solid rgba(126,227,252,.07);
      font-size:.73rem;color:var(--dim);white-space:nowrap;
    }
    .sched-table td:first-child{
      text-align:left;padding-left:.75rem;
      color:var(--cyan);font-weight:600;font-size:.67rem;white-space:nowrap;
    }
    .sched-table td small{display:block;font-size:.59rem;opacity:.6;}
    .sched-table tbody tr:nth-child(even) td{background:rgba(86,208,245,.03);}
    .sched-table tbody tr:hover td{background:rgba(86,208,245,.06);}
    .sched-table .row-recreo td{
      background:rgba(126,227,252,.06)!important;
      color:var(--cyan);font-style:italic;font-size:.7rem;font-weight:500;
    }
    .sched-table .today-col{background:rgba(126,227,252,.06)!important;}

    .aseo-section{margin-top:1rem;}
    .aseo-title{font-size:.68rem;color:var(--cyan);font-weight:700;letter-spacing:1.5px;text-transform:uppercase;margin-bottom:.8rem;}
    .aseo-day{margin-bottom:.75rem;}
    .aseo-day:last-child{margin-bottom:0;}
    .aseo-day-head{
      font-size:.72rem;font-weight:700;color:var(--white);
      background:rgba(86,208,245,.12);border-radius:6px 6px 0 0;
      padding:.38rem .7rem;border:1px solid rgba(126,227,252,.18);border-bottom:none;
    }
    .aseo-day-body{
      display:grid;grid-template-columns:1fr 1fr;gap:0;
      border:1px solid rgba(126,227,252,.18);border-radius:0 0 6px 6px;overflow:hidden;
    }
    .aseo-col{padding:.55rem .7rem;background:rgba(255,255,255,.02);}
    .aseo-col:first-child{border-right:1px solid rgba(126,227,252,.12);}
    .aseo-col-head{font-size:.63rem;font-weight:700;color:var(--cyan);text-transform:uppercase;letter-spacing:.8px;margin-bottom:.35rem;}
    .aseo-col-names{font-size:.72rem;color:var(--dim);line-height:1.6;}
    .aseo-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:.5rem;}
    .aseo-card{background:rgba(255,255,255,.03);border:1px solid rgba(126,227,252,.12);border-radius:var(--rm);padding:.65rem .8rem;}
    .aseo-week{font-size:.67rem;color:var(--cyan);font-weight:600;margin-bottom:.3rem;}
    .aseo-names{font-size:.71rem;color:var(--dim);line-height:1.5;}

    /* ── feed / publicaciones ── */
    .feed-wrapper{
      background:rgba(10,40,65,.55);
      backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
      border:1px solid var(--g-border);border-radius:var(--rx);
      padding:1.3rem 1.1rem;box-shadow:var(--shadow-sm);
    }
    .feed-head{
      font-family:'Outfit',sans-serif;font-size:.67rem;font-weight:700;
      color:var(--cyan);letter-spacing:2px;text-transform:uppercase;
      margin-bottom:1rem;display:flex;align-items:center;gap:.45rem;
      border-bottom:1px solid rgba(126,227,252,.12);padding-bottom:.7rem;
    }
    .post-card{
      background:rgba(255,255,255,.03);border:1px solid rgba(126,227,252,.1);
      border-radius:var(--rl);padding:.95rem 1rem;margin-bottom:.8rem;
      transition:border-color .2s,background .2s;
    }
    .post-card:last-child{margin-bottom:0;}
    .post-card:hover{border-color:rgba(126,227,252,.28);background:rgba(86,208,245,.04);}
    .post-top{display:flex;align-items:flex-start;justify-content:space-between;gap:.5rem;margin-bottom:.42rem;}
    .post-title{font-size:.9rem;font-weight:600;line-height:1.3;}
    .post-date{font-size:.65rem;color:var(--dim);white-space:nowrap;flex-shrink:0;}
    .post-gtag{
      display:inline-block;padding:.1rem .48rem;
      background:rgba(86,208,245,.12);border-radius:4px;
      font-size:.62rem;color:var(--cyan);margin-bottom:.42rem;font-weight:500;
    }
    .post-body{font-size:.79rem;color:var(--dim);line-height:1.65;margin-bottom:.52rem;}

    /* ── Imágenes: ratio preservado, tamaño limitado ── */
    .post-img-wrap{
      display:flex;justify-content:center;
      margin-bottom:.6rem;
      background:rgba(0,0,0,.12);
      border-radius:8px;overflow:hidden;
    }
    .post-img{
      display:block;max-width:100%;max-height:320px;
      width:auto;height:auto;
      object-fit:contain;border-radius:8px;
    }

    .post-link{
      display:inline-flex;align-items:center;gap:.38rem;padding:.27rem .68rem;
      background:rgba(86,208,245,.08);border:1px solid rgba(86,208,245,.22);
      border-radius:6px;color:var(--cyan);text-decoration:none;font-size:.76rem;
      transition:background .2s;
    }
    .post-link:hover{background:rgba(86,208,245,.18);}

    /* ── Reacciones ── */
    .post-reactions{
      display:flex;align-items:center;gap:.3rem;flex-wrap:wrap;
      padding-top:.55rem;margin-top:.55rem;
      border-top:1px solid rgba(126,227,252,.08);
    }
    .rx-btn{
      display:inline-flex;align-items:center;gap:.25rem;
      padding:.25rem .55rem;border-radius:20px;
      background:rgba(255,255,255,.04);border:1px solid rgba(126,227,252,.12);
      color:var(--dim);font-size:.74rem;cursor:pointer;
      font-family:inherit;transition:all .2s;user-select:none;
    }
    .rx-btn:hover{background:rgba(86,208,245,.1);border-color:rgba(126,227,252,.25);}
    .rx-btn.active{
      background:rgba(86,208,245,.15);border-color:rgba(126,227,252,.4);
      color:var(--cyan);
    }
    .rx-btn .rx-emoji{font-size:.85rem;line-height:1;}
    .rx-btn .rx-count{font-size:.68rem;font-weight:600;min-width:.6em;text-align:center;}

    /* ── Comentarios ── */
    .post-comments{margin-top:.55rem;}
    .cmt-toggle{
      display:inline-flex;align-items:center;gap:.3rem;
      background:none;border:none;color:var(--dim);
      font-size:.72rem;font-family:inherit;cursor:pointer;
      padding:.2rem 0;transition:color .2s;
    }
    .cmt-toggle:hover{color:var(--cyan);}
    .cmt-section{
      display:none;margin-top:.5rem;
      animation:fadeIn .2s ease;
    }
    .cmt-section.open{display:block;}
    .cmt-list{
      max-height:260px;overflow-y:auto;
      scrollbar-width:thin;scrollbar-color:rgba(126,227,252,.15) transparent;
      margin-bottom:.5rem;
    }
    .cmt-item{
      padding:.5rem .65rem;margin-bottom:.35rem;
      background:rgba(255,255,255,.03);border-radius:8px;
      border-left:2px solid rgba(126,227,252,.2);
      animation:slideUp .25s ease;
    }
    .cmt-item:last-child{margin-bottom:0;}
    .cmt-head{display:flex;align-items:center;justify-content:space-between;gap:.4rem;margin-bottom:.18rem;}
    .cmt-author{font-size:.7rem;font-weight:600;color:var(--cyan);}
    .cmt-time{font-size:.6rem;color:rgba(200,242,255,.35);}
    .cmt-text{font-size:.74rem;color:var(--dim);line-height:1.5;word-break:break-word;}
    .cmt-empty{font-size:.72rem;color:rgba(200,242,255,.3);text-align:center;padding:.6rem;font-style:italic;}
    .cmt-form{display:flex;gap:.35rem;align-items:flex-end;}
    .cmt-input{
      flex:1;padding:.5rem .7rem;
      background:rgba(255,255,255,.05);border:1px solid rgba(126,227,252,.18);
      border-radius:8px;color:var(--white);font-size:.76rem;
      font-family:'DM Sans',sans-serif;outline:none;resize:none;
      min-height:36px;max-height:80px;line-height:1.4;
      transition:border-color .2s,background .2s;
    }
    .cmt-input::placeholder{color:rgba(200,242,255,.3);font-size:.73rem;}
    .cmt-input:focus{border-color:var(--cyan);background:rgba(86,208,245,.06);}
    .cmt-send{
      padding:.45rem .7rem;
      background:linear-gradient(135deg,var(--sky),var(--mid));
      border:none;border-radius:8px;color:white;
      font-size:.75rem;font-weight:600;cursor:pointer;
      font-family:inherit;transition:opacity .2s,transform .15s;
      white-space:nowrap;flex-shrink:0;
    }
    .cmt-send:hover{opacity:.85;transform:translateY(-1px);}
    .cmt-send:active{transform:translateY(0);}
    .cmt-send:disabled{opacity:.4;cursor:not-allowed;transform:none;}

    .empty{text-align:center;padding:1.6rem 1rem;color:var(--dim);font-size:.84rem;}
    .empty-i{font-size:2.1rem;display:block;margin-bottom:.45rem;}

    /* ══ DRAWER ══════════════════════════════════════════════════ */
    .drawer-fab{
      position:fixed;bottom:22px;right:16px;z-index:90;
      width:52px;height:52px;border-radius:50%;
      background:linear-gradient(135deg,var(--sky),var(--mid));
      border:none;cursor:pointer;
      box-shadow:0 6px 22px rgba(86,208,245,.4);
      display:none;align-items:center;justify-content:center;
      font-size:1.35rem;transition:transform .2s,box-shadow .2s;
    }
    .drawer-fab:hover{transform:scale(1.08);box-shadow:0 10px 30px rgba(86,208,245,.55);}
    .drawer-fab:active{transform:scale(.96);}
    .fab-dot{
      position:absolute;top:5px;right:5px;
      width:10px;height:10px;border-radius:50%;
      background:#f87171;border:2px solid var(--navy);
    }

    .drawer-overlay{
      position:fixed;inset:0;z-index:150;
      background:rgba(0,0,0,.52);backdrop-filter:blur(4px);
      -webkit-backdrop-filter:blur(4px);
      display:none;opacity:0;transition:opacity .25s ease;
    }
    .drawer-overlay.open{display:block;}
    .drawer-overlay.visible{opacity:1;}

    .drawer{
      position:fixed;top:0;right:0;bottom:0;
      width:min(330px,92vw);z-index:160;
      background:rgba(7,22,40,.97);
      backdrop-filter:blur(30px) saturate(1.6);
      -webkit-backdrop-filter:blur(30px) saturate(1.6);
      border-left:1px solid rgba(126,227,252,.2);
      box-shadow:-10px 0 60px rgba(0,0,0,.45);
      display:flex;flex-direction:column;
      transform:translateX(100%);
      transition:transform .3s cubic-bezier(.16,1,.3,1);
      overflow:hidden;
    }
    .drawer.open{transform:translateX(0);}

    .drawer-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:.9rem 1.1rem .75rem;
      border-bottom:1px solid rgba(126,227,252,.12);flex-shrink:0;
    }
    .drawer-title{
      font-family:'Outfit',sans-serif;font-size:.95rem;font-weight:700;
      background:linear-gradient(90deg,var(--cyan),var(--ice));
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
      letter-spacing:1.5px;
    }
    .drawer-close{
      width:30px;height:30px;border-radius:7px;
      background:rgba(255,255,255,.06);border:1px solid rgba(126,227,252,.12);
      color:var(--dim);font-size:1rem;cursor:pointer;font-family:inherit;
      display:flex;align-items:center;justify-content:center;
      transition:background .2s,color .2s;
    }
    .drawer-close:hover{background:rgba(255,255,255,.1);color:var(--white);}

    .drawer-tabs{display:flex;flex-shrink:0;border-bottom:1px solid rgba(126,227,252,.1);}
    .drawer-tab{
      flex:1;padding:.6rem .45rem;background:none;
      border:none;border-bottom:2px solid transparent;margin-bottom:-1px;
      color:var(--dim);font-size:.76rem;font-weight:500;
      font-family:inherit;cursor:pointer;
      transition:color .2s,border-color .2s,background .2s;
    }
    .drawer-tab.active{color:var(--cyan);border-bottom-color:var(--cyan);background:rgba(86,208,245,.05);}

    .drawer-body{
      flex:1;overflow-y:auto;padding:.95rem 1rem;
      scrollbar-width:thin;scrollbar-color:rgba(126,227,252,.2) transparent;
    }
    .dpane{display:none;}
    .dpane.active{display:block;animation:fadeIn .2s ease;}

    .ann-item{
      padding:.75rem .85rem;background:rgba(255,255,255,.03);
      border-radius:var(--rm);border-left:2px solid var(--sky);
      margin-bottom:.65rem;transition:background .2s;
    }
    .ann-item:last-child{margin-bottom:0;}
    .ann-item:hover{background:rgba(86,208,245,.06);}
    .ann-t{font-size:.8rem;font-weight:600;margin-bottom:.22rem;}
    .ann-b{font-size:.73rem;color:var(--dim);line-height:1.5;}
    .ann-d{font-size:.64rem;color:var(--cyan);margin-top:.3rem;}

    .tool-link{
      display:flex;align-items:center;gap:.6rem;padding:.56rem .75rem;margin-bottom:.38rem;
      background:rgba(255,255,255,.03);border:1px solid transparent;
      border-radius:8px;text-decoration:none;color:var(--white);font-size:.8rem;
      transition:all .2s;
    }
    .tool-link:last-child{margin-bottom:0;}
    .tool-link:hover{background:rgba(86,208,245,.1);border-color:rgba(126,227,252,.22);transform:translateX(3px);}
    .tool-icon{font-size:1rem;flex-shrink:0;}

    @media(max-width:500px){
      .login-card{padding:2rem 1.3rem;}
      .topbar{padding:.55rem .8rem;}
      .topbar-pill{max-width:105px;font-size:.65rem;}
      .student-card{flex-direction:column;text-align:center;padding:1.1rem .9rem;}
      .sc-bg{display:none;}
      .app-body{padding:.85rem .75rem 6rem;gap:.95rem;}
      .tab-btn{font-size:.72rem;padding:.72rem .2rem;gap:.2rem;}
      .tab-pane{padding:1rem .75rem;}
      .drawer-fab{bottom:16px;right:12px;width:48px;height:48px;font-size:1.25rem;}
      .dem-iframe-wrap iframe{height:320px;}
      .post-img{max-height:240px;}
    }
  </style>
</head>
<body>
<div id="root-wrapper">

<!-- ══ LOGIN ══════════════════════════════════════════════════════ -->
<div id="login-screen">
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="login-card">
    <div class="logo-wrap">
      <div class="logo-ring"></div>
      <img id="ll-img" src="https://raw.githubusercontent.com/coeduca/registro/main/COEDUCAlogo.png"
           alt="COEDUCA" class="login-logo"
           onerror="this.style.display='none';document.getElementById('ll-fb').style.display='flex';">
      <div id="ll-fb" class="logo-fb" style="display:none">CE</div>
    </div>
    <div class="login-title">COEDUCA</div>
    <div class="login-sub">Portal Estudiantil 2026</div>

    <div class="autologin-banner" id="al-banner">
      <strong id="al-name">—</strong>
      <span class="al-grade" id="al-grade">—</span>
      <button class="btn-al" onclick="doAutoLogin()">▶ Continuar como este estudiante</button>
      <button class="btn-other" onclick="clearRemembered()">Soy otro estudiante</button>

    <label class="input-label" for="nie-input">Número de Identificación Estudiantil</label>

           placeholder="Ingresa tu NIE aquí" maxlength="15"
           autocomplete="off" spellcheck="false">

    <button class="btn-login" onclick="doLogin()">🔐 &nbsp;Ingresar al Portal</button>
    <div class="login-error" id="login-error">⚠️ NIE no encontrado. Verifica e intenta de nuevo.</div>

</div>

<!-- ══ APP ════════════════════════════════════════════════════════ -->
<div id="app">
  <div class="topbar">
    <div class="topbar-brand">
      <img src="https://raw.githubusercontent.com/coeduca/registro/main/COEDUCAlogo.png"
           alt="" class="topbar-logo" onerror="this.style.display='none'">
      <div>
        <div class="topbar-name">COEDUCA</div>
        <div class="topbar-tagline">Portal Estudiantil</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="topbar-pill" id="topbar-pill">—</div>
      <button class="btn-logout" onclick="doLogout()">⬅ Salir</button>
    </div>
  </div>

  <div class="app-body">

      <div class="sc-bg"></div>

        <div class="s-name"  id="s-name">—</div>

          <a href="#" id="cal-link" target="_blank" class="btn-cal">📊 Ver mis Calificaciones</a>
        </div>
      </div>

      <div class="tab-pane" id="pane-dem">
        <div class="dem-center" id="dem-content"></div>
      </div>

      <div class="tab-pane" id="pane-hor">
        <div class="hor-subtabs">
          <button class="hor-tab active" onclick="switchHorTab('clases',this)">📚 Clases</button>
          <button class="hor-tab"        onclick="switchHorTab('aseo',this)">🧹 Aseo</button>

<!-- ══ DRAWER ══════════════════════════════════════════════════════ -->
<div class="drawer-overlay" id="drawer-overlay" onclick="closeDrawer()"></div>

    <button class="drawer-close" onclick="closeDrawer()">✕</button>
  </div>
  <div class="drawer-tabs">
    <button class="drawer-tab active" onclick="switchDrawerTab('ann',this)">📢 Anuncios</button>
    <button class="drawer-tab"        onclick="switchDrawerTab('tools',this)">🛠️ Herramientas</button>
  </div>

    <div class="dpane active" id="dpane-ann"></div>
    <div class="dpane"        id="dpane-tools"></div>
  </div>
</div>

<button class="drawer-fab" id="drawer-fab" onclick="openDrawer()" title="Anuncios y herramientas">
  📢
  <div class="fab-dot" id="fab-dot" style="display:none"></div>
</button>

</div>

<script>
"use strict";
const LS = 'coeduca_nie';
let _student = null;
const DAYS = ['Domingo','Lunes','Martes','Miércoles','Jueves','Viernes','Sábado'];
const TODAY = DAYS[new Date().getDay()];

/* ── Convierte URL de Google Sheets edit → embed ── */
function sheetEditToEmbed(editUrl) {
  try {
    const match = editUrl.match(/\/spreadsheets\/d\/([^/]+)/);
    if (match) return 'https://docs.google.com/spreadsheets/d/' + match[1] + '/htmlembed?widget=true';
  } catch(e) {}
  return null;
}

/* ── init ── */
(function(){
  const nie = localStorage.getItem(LS);
  if(nie){
    const s = (window.STUDENTS||[]).find(x=>x.nie===nie);
    if(s){
      window._rem = s;
      document.getElementById('al-name').textContent = s.nombre;
      document.getElementById('al-grade').textContent = s.grado;
      document.getElementById('al-banner').style.display = 'block';
    }
  }
  buildDrawer();
})();

document.getElementById('nie-input').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

function doAutoLogin(){ if(window._rem){ localStorage.setItem(LS,window._rem.nie); _student=window._rem; renderApp(_student); } }

function clearRemembered(){
  localStorage.removeItem(LS); window._rem=null;
  document.getElementById('al-banner').style.display='none';
}

function doLogin(){
  const nie = document.getElementById('nie-input').value.trim();
  if(!nie) return;
  const s = (window.STUDENTS||[]).find(x=>x.nie===nie);
  if(s){ localStorage.setItem(LS,nie); _student=s; renderApp(s); }
  else{
    const el=document.getElementById('login-error');
    el.style.display='block'; setTimeout(()=>el.style.display='none',4500);
  }
}

function doLogout(){
  localStorage.removeItem(LS); _student=null; window._rem=null;
  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('nie-input').value='';
  document.getElementById('al-banner').style.display='none';
  document.getElementById('drawer-fab').style.display='none';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.querySelectorAll('.tab-pane').forEach((p,i)=>p.classList.toggle('active',i===0));
  document.querySelectorAll('.hor-tab').forEach((b,i)=>b.classList.toggle('active',i===0));
  document.querySelectorAll('.hor-panel').forEach((p,i)=>p.classList.toggle('active',i===0));
  closeDrawer();
}

function renderApp(s){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  document.getElementById('drawer-fab').style.display='flex';

  document.getElementById('s-name').textContent = s.nombre;
  document.getElementById('s-grade').textContent = s.grado;
  document.getElementById('s-nie').textContent   = s.nie;
  document.getElementById('s-avatar').textContent = s.sexo==='F'?'👩‍🎓':'👨‍🎓';

  const parts = s.nombre.split(',');
  const short = parts.length>1
    ? parts[1].trim().split(' ')[0]+' '+parts[0].trim().split(' ')[0]
    : s.nombre.split(' ')[0];
  document.getElementById('topbar-pill').textContent = short;

  const cfg = window.COEDUCA_CONFIG||{};
  const calUrl = (cfg.calificaciones_urls||{})[s.grado]||'#';
  const calLink = document.getElementById('cal-link');
  const calMsg  = document.getElementById('cal-msg');
  if(calUrl==='#'){
    calMsg.textContent='Las calificaciones estarán disponibles próximamente. Consulta con tu docente.';
    calLink.style.display='none';
  } else {
    calMsg.textContent='Consulta tu registro académico oficial.';
    calLink.href=calUrl; calLink.style.display='inline-flex';
  }

  renderDemeritos(s);
  renderHorario(s.grado);
  renderFeed(s.grado);

  const annCount = (cfg.anuncios||[]).length;
  document.getElementById('fab-dot').style.display = annCount?'block':'none';
}

function renderDemeritos(s){
  const el = document.getElementById('dem-content');
  let h = '<div class="dem-sname">Registro de: <span>' + s.nombre + '</span></div>';

  if(s.demeritos_url){
    const embedUrl = sheetEditToEmbed(s.demeritos_url);
    if(embedUrl){
      const uid = 'dem-' + s.nie;
      h += '<div class="dem-iframe-wrap">'
         + '<iframe id="if-'+uid+'" src="'+embedUrl+'" title="Registro de deméritos" loading="lazy" '
         + 'onload="var l=document.getElementById(\'ld-'+uid+'\');if(l)l.classList.add(\'hidden\')"></iframe>'
         + '<div class="dem-iframe-loading" id="ld-'+uid+'">⏳ Cargando registro…</div>'
         + '</div>'
         + '<div class="dem-actions">'
         + '<a href="'+s.demeritos_url+'" target="_blank" class="btn-dem-secondary">↗ Abrir en Google Sheets</a>'
         + '</div>';
    } else {
      h += '<a href="'+s.demeritos_url+'" target="_blank" class="btn-dem">⚠️ Abrir mi Registro de Deméritos</a>';
    }
    h += '<p class="dem-note">Este es tu registro personal de deméritos. Si tienes dudas, consulta con tu docente.</p>';
  } else {
    h += '<div class="dem-nolink">📋 El enlace a tu registro de deméritos aún no está disponible.<br>'
       + 'Consulta directamente con tu docente.</div>';
  }
  el.innerHTML = h;
}

function renderHorario(grado){
  const h = (window.HORARIOS||{})[grado];
  const dias = ['Lunes','Martes','Miércoles','Jueves','Viernes'];

  if(!h){
    document.getElementById('hor-clases').innerHTML='<p class="empty"><span class="empty-i">🗓️</span>Horario no disponible.</p>';
    document.getElementById('hor-aseo').innerHTML=''; return;
  }

  let t='<div class="sched-wrap"><div class="sched-scroll"><table class="sched-table"><thead><tr>';
  t+='<th>Período / Hora</th>';
  dias.forEach(d=>{
    const td=d===TODAY;
    t+='<th'+(td?' class="today-col"':'')+'>'+d+(td?' ✦':'')+'</th>';
  });
  t+='</tr></thead><tbody>';

  h.periodos.forEach((p,i)=>{
    if(p.recreo){
      t+='<tr class="row-recreo"><td>'+p.etiqueta+'<small>'+p.hora+'</small></td><td colspan="5">☕ '+p.etiqueta+'</td></tr>';
    } else {
      t+='<tr><td>'+p.etiqueta+'<small>'+p.hora+'</small></td>';
      dias.forEach(d=>{
        const td=d===TODAY;
        const mat=(h.dias[d]&&h.dias[d][i]!=null)?h.dias[d][i]:'—';
        t+='<td'+(td?' class="today-col"':'')+'>'+mat+'</td>';
      });
      t+='</tr>';
    }
  });
  t+='</tbody></table></div></div>';
  document.getElementById('hor-clases').innerHTML=t;

  if(h.aseo && h.aseo.tipo === 'diario'){
    let a='<div class="aseo-section"><div class="aseo-title">🧹 Horario de Aseo</div>';
    h.aseo.dias.forEach(d=>{
      const isToday = d.dia === TODAY;
      const todayStyle = isToday ? ' style="background:rgba(126,227,252,.06);border-color:rgba(126,227,252,.35)"' : '';
      const todayHead  = isToday ? ' style="background:rgba(126,227,252,.22);color:#fff"' : '';
      a+='<div class="aseo-day"><div class="aseo-day-head"'+todayHead+'>'+d.dia+(isToday?' ✦ hoy':'')+'</div>'
        +'<div class="aseo-day-body"'+todayStyle+'>'
        +'<div class="aseo-col"><div class="aseo-col-head">🌿 Zona</div><div class="aseo-col-names">'+d.zona.join('<br>')+'</div></div>'
        +'<div class="aseo-col"><div class="aseo-col-head">🏫 Aula</div><div class="aseo-col-names">'+d.aula.join('<br>')+'</div></div>'
        +'</div></div>';
    });
    a+='</div>';
    document.getElementById('hor-aseo').innerHTML=a;
  } else if(h.aseo && h.aseo.grupos){
    let a='<div class="aseo-section"><div class="aseo-title">🧹 '+(h.aseo.descripcion||'Rotación de aseo')+'</div><div class="aseo-grid">';
    h.aseo.grupos.forEach(g=>{
      a+='<div class="aseo-card"><div class="aseo-week">'+g.semana+'</div><div class="aseo-names">'+g.encargados.join('<br>')+'</div></div>';
    });
    a+='</div></div>';
    document.getElementById('hor-aseo').innerHTML=a;
  } else {
    document.getElementById('hor-aseo').innerHTML='<p class="empty"><span class="empty-i">🧹</span>Horario de aseo no disponible aún.</p>';
  }
}

function renderFeed(grado){
  var cfg=window.COEDUCA_CONFIG||{};
  var posts=(cfg.publicaciones||[]).filter(function(p){return !p.grado||p.grado==='Todos'||p.grado===grado;});
  var el=document.getElementById('feed-posts');
  if(!posts.length){ el.innerHTML='<p class="empty"><span class="empty-i">📭</span>Sin publicaciones por ahora.</p>'; return; }

  window._feedPosts = posts.map(function(p,i){
    return Object.assign({}, p, { _id: 'p'+simpleHash(p.titulo+p.fecha) });
  });

  // Render esqueleto inmediato (sin datos del servidor)
  renderFeedCards(window._feedPosts);

  // Cargar datos del servidor
  if(API_URL){
    var ids = window._feedPosts.map(function(p){ return p._id; });
    apiGet('getData', { postIds: ids.join(',') }, function(data){
      if(!data) return;
      window._serverData = data; // { reactions:{pid:{like:3,...}}, myReactions:{pid:"like"}, comments:{pid:[...]} }
      // Re-render con datos reales
      renderFeedCards(window._feedPosts);
    });
  }
}

function renderFeedCards(posts){
  var el=document.getElementById('feed-posts');
  var sd = window._serverData || { reactions:{}, myReactions:{}, comments:{} };
  var nie = _student ? _student.nie : '';
  var h='';

  posts.forEach(function(p){
    var pid = p._id;
    var rxData = sd.reactions[pid] || {};
    var myRx = sd.myReactions[pid] || '';
    var cmts = sd.comments[pid] || [];

    h+='<div class="post-card" id="post-'+pid+'">';
    if(p.grado&&p.grado!=='Todos') h+='<div class="post-gtag">📌 '+p.grado+'</div>';
    h+='<div class="post-top"><div class="post-title">'+p.titulo+'</div><div class="post-date">'+p.fecha+'</div></div>';
    if(p.texto) h+='<div class="post-body">'+p.texto+'</div>';
    if(p.imagen) h+='<div class="post-img-wrap"><img src="'+p.imagen+'" class="post-img" alt="" loading="lazy"></div>';
    if(p.enlace) h+='<a href="'+p.enlace.url+'" target="_blank" class="post-link">🔗 '+(p.enlace.texto||'Ver enlace')+'</a>';

    // Reacciones
    h+='<div class="post-reactions" id="rx-'+pid+'">';
    h+=buildRxHtml(pid, rxData, myRx);
    h+='</div>';

    // Comentarios
    var cmtCount = cmts.length;
    h+='<div class="post-comments">';
    h+='<button class="cmt-toggle" onclick="toggleCmts(\''+pid+'\')">'
      +'💬 <span id="cmt-lbl-'+pid+'">'+(cmtCount ? cmtCount+' comentario'+(cmtCount>1?'s':'') : 'Comentar')+'</span></button>';
    h+='<div class="cmt-section" id="cmt-sec-'+pid+'">';
    h+='<div class="cmt-list" id="cmt-list-'+pid+'">';
    if(!cmts.length) h+='<div class="cmt-empty">Sé el primero en comentar</div>';
    else cmts.forEach(function(c){ h+=buildCmtHtml(c); });
    h+='</div>';
    h+='<div class="cmt-form">';
    h+='<textarea class="cmt-input" id="cmt-in-'+pid+'" placeholder="Escribe un comentario…" rows="1" '
      +'onkeydown="if(event.key===\'Enter\'&&!event.shiftKey){event.preventDefault();addCmt(\''+pid+'\');}"></textarea>';
    h+='<button class="cmt-send" id="cmt-btn-'+pid+'" onclick="addCmt(\''+pid+'\')">Enviar</button>';
    h+='</div>';
    h+='</div></div>';

    h+='</div>';
  });
  el.innerHTML=h;
}

/* ══════════════════════════════════════════════════════════════
   API — Google Apps Script backend
   ══════════════════════════════════════════════════════════════ */

// ⚠️  PEGA AQUÍ TU URL de Apps Script (ver instrucciones en SETUP_BACKEND.md)
var API_URL = 'https://script.google.com/macros/s/AKfycbwGpeSkZ4F8avzGVFu97wSX8-cIaiKGPlcQJnIRxIZ5tzC1htXG6zzyMc3IuECf9UYp/exec';  // Ejemplo: 'https://script.google.com/macros/s/AKfycb.../exec'

window._serverData = { reactions:{}, myReactions:{}, comments:{} };
var _apiQueue = {};  // evita envíos duplicados

function apiGet(action, params, cb){
  if(!API_URL){ cb(null); return; }
  var nie = _student ? _student.nie : '';
  var qs = '?action='+action+'&nie='+encodeURIComponent(nie);
  for(var k in params) qs += '&'+k+'='+encodeURIComponent(params[k]);

  fetch(API_URL + qs)
    .then(function(r){ return r.json(); })
    .then(function(d){ cb(d); })
    .catch(function(e){ console.warn('API GET error:', e); cb(null); });
}

function apiPost(action, body, cb){
  if(!API_URL){ if(cb) cb(null); return; }
  body.action = action;
  body.nie = _student ? _student.nie : '';

  fetch(API_URL, {
    method: 'POST',
    headers: {'Content-Type':'text/plain'},
    body: JSON.stringify(body)
  })
    .then(function(r){ return r.json(); })
    .then(function(d){ if(cb) cb(d); })
    .catch(function(e){ console.warn('API POST error:', e); if(cb) cb(null); });
}

/* ── Reactions ── */
var REACTIONS = [
  { key:'like',  emoji:'👍', label:'Me gusta' },
  { key:'love',  emoji:'❤️', label:'Me encanta' },
  { key:'laugh', emoji:'😂', label:'Jaja' },
  { key:'wow',   emoji:'😮', label:'Wow' },
  { key:'clap',  emoji:'👏', label:'Aplausos' }
];

function simpleHash(str){
  var h=0;
  for(var i=0;i<str.length;i++){ h=((h<<5)-h)+str.charCodeAt(i); h|=0; }
  return Math.abs(h).toString(36);
}

function buildRxHtml(pid, rxData, myRx){
  var h='';
  REACTIONS.forEach(function(r){
    var count = rxData[r.key]||0;
    var active = myRx===r.key?' active':'';
    h+='<button class="rx-btn'+active+'" onclick="toggleRx(\''+pid+'\',\''+r.key+'\')" title="'+r.label+'">'
      +'<span class="rx-emoji">'+r.emoji+'</span>'
      +'<span class="rx-count">'+(count||'')+'</span>'
      +'</button>';
  });
  return h;
}

function toggleRx(pid, key){
  var sd = window._serverData;
  var rxData = sd.reactions[pid] || {};
  var myPrev = sd.myReactions[pid] || '';

  // Actualización optimista (UI inmediata)
  if(myPrev === key){
    rxData[key] = Math.max(0, (rxData[key]||1) - 1);
    if(!rxData[key]) delete rxData[key];
    sd.myReactions[pid] = '';
  } else {
    if(myPrev && rxData[myPrev]){
      rxData[myPrev] = Math.max(0, rxData[myPrev] - 1);
      if(!rxData[myPrev]) delete rxData[myPrev];
    }
    rxData[key] = (rxData[key]||0) + 1;
    sd.myReactions[pid] = key;
  }
  sd.reactions[pid] = rxData;

  // Actualizar UI
  var el = document.getElementById('rx-'+pid);
  if(el) el.innerHTML = buildRxHtml(pid, rxData, sd.myReactions[pid]);

  // Enviar al servidor
  apiPost('react', { postId: pid, reaction: key }, function(resp){
    // Si el servidor responde, sincronizar datos reales
    if(resp && resp.reactions){
      sd.reactions[pid] = resp.reactions;
      sd.myReactions[pid] = resp.myReaction || '';
      if(el) el.innerHTML = buildRxHtml(pid, sd.reactions[pid], sd.myReactions[pid]);
    }
  });
}

/* ── Comments ── */
function getShortName(){
  if(!_student) return 'Anónimo';
  var parts = _student.nombre.split(',');
  if(parts.length>1) return parts[1].trim().split(' ')[0]+' '+parts[0].trim().split(' ')[0];
  return _student.nombre.split(' ')[0];
}

function buildCmtHtml(c){
  return '<div class="cmt-item">'
    +'<div class="cmt-head"><span class="cmt-author">'+escHtml(c.author)+'</span>'
    +'<span class="cmt-time">'+escHtml(c.time)+'</span></div>'
    +'<div class="cmt-text">'+escHtml(c.text)+'</div>'
    +'</div>';
}

function escHtml(s){
  if(!s) return '';
  var d=document.createElement('div');d.textContent=s;return d.innerHTML;
}

function toggleCmts(pid){
  var sec = document.getElementById('cmt-sec-'+pid);
  if(sec) sec.classList.toggle('open');
}

function addCmt(pid){
  var input = document.getElementById('cmt-in-'+pid);
  var btn   = document.getElementById('cmt-btn-'+pid);
  if(!input) return;
  var text = input.value.trim();
  if(!text) return;

  // Deshabilitar para evitar doble envío
  if(btn){ btn.disabled=true; btn.textContent='…'; }

  var now = new Date();
  var time = now.getDate()+'/'+(now.getMonth()+1)+'/'+now.getFullYear()+' '
           + String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0');
  var author = getShortName();

  var newCmt = { author: author, text: text, time: time };

  // UI optimista
  var list = document.getElementById('cmt-list-'+pid);
  if(list){
    var empty = list.querySelector('.cmt-empty');
    if(empty) empty.remove();
    list.insertAdjacentHTML('beforeend', buildCmtHtml(newCmt));
    list.scrollTop = list.scrollHeight;
  }
  input.value='';

  // Guardar localmente
  var sd = window._serverData;
  if(!sd.comments[pid]) sd.comments[pid] = [];
  sd.comments[pid].push(newCmt);
  var n = sd.comments[pid].length;
  var lbl = document.getElementById('cmt-lbl-'+pid);
  if(lbl) lbl.textContent = n + ' comentario' + (n>1?'s':'');

  // Enviar al servidor
  apiPost('comment', { postId: pid, author: author, text: text }, function(resp){
    if(btn){ btn.disabled=false; btn.textContent='Enviar'; }
    // Sincronizar si el servidor retorna la lista actualizada
    if(resp && resp.comments){
      sd.comments[pid] = resp.comments;
      // Re-render la lista completa para mostrar comentarios de otros
      if(list){
        var ch='';
        resp.comments.forEach(function(c){ ch+=buildCmtHtml(c); });
        list.innerHTML = ch || '<div class="cmt-empty">Sé el primero en comentar</div>';
        list.scrollTop = list.scrollHeight;
      }
      var nn = resp.comments.length;
      if(lbl) lbl.textContent = nn + ' comentario' + (nn>1?'s':'');
    }
  });
}

function buildDrawer(){
  const cfg=window.COEDUCA_CONFIG||{};
  const anns=cfg.anuncios||[];
  let ah='';
  if(!anns.length) ah='<p style="font-size:.76rem;color:var(--dim)">Sin anuncios por ahora.</p>';
  else anns.forEach(a=>{ ah+='<div class="ann-item"><div class="ann-t">'+a.titulo+'</div><div class="ann-b">'+a.texto+'</div><div class="ann-d">📅 '+a.fecha+'</div></div>'; });
  document.getElementById('dpane-ann').innerHTML=ah;

  const tools=cfg.herramientas||[];
  let th='';
  if(!tools.length) th='<p style="font-size:.76rem;color:var(--dim)">Sin herramientas configuradas.</p>';
  else tools.forEach(t=>{ th+='<a href="'+t.url+'" target="_blank" class="tool-link"><span class="tool-icon">'+t.icono+'</span><span>'+t.nombre+'</span></a>'; });
  document.getElementById('dpane-tools').innerHTML=th;
}

function switchTab(n,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-pane').forEach(p=>p.classList.remove('active'));
  btn&&btn.classList.add('active');
  document.getElementById('pane-'+n).classList.add('active');
}
function switchHorTab(n,btn){
  document.querySelectorAll('.hor-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.hor-panel').forEach(p=>p.classList.remove('active'));
  btn&&btn.classList.add('active');
  document.getElementById('hor-'+n).classList.add('active');
}
function switchDrawerTab(n,btn){
  document.querySelectorAll('.drawer-tab').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.dpane').forEach(p=>p.classList.remove('active'));
  btn&&btn.classList.add('active');
  document.getElementById('dpane-'+n).classList.add('active');
  if(n==='ann') document.getElementById('fab-dot').style.display='none';
}

function openDrawer(){
  const ov=document.getElementById('drawer-overlay');
  const dr=document.getElementById('drawer');
  ov.classList.add('open');
  requestAnimationFrame(()=>{ ov.classList.add('visible'); dr.classList.add('open'); });
  document.body.style.overflow='hidden';
}
function closeDrawer(){
  const ov=document.getElementById('drawer-overlay');
  const dr=document.getElementById('drawer');
  ov.classList.remove('visible'); dr.classList.remove('open');
  setTimeout(()=>ov.classList.remove('open'),250);
  document.body.style.overflow='';
}
document.addEventListener('keydown',e=>{ if(e.key==='Escape') closeDrawer(); });
</script>
